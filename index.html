<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documental Bíblico</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:24px;
}

.tabs{
display:flex;
background:#111827;
border-bottom:2px solid #333;
flex-wrap:wrap;
}

.tab{
padding:14px 25px;
cursor:pointer;
border-right:1px solid #333;
transition:0.3s;
}

.tab:hover{
background:#1f2937;
}

.tab.active{
background:#fbbf24;
color:black;
font-weight:bold;
}

.contenido{
width:100%;
height:calc(100vh - 120px);
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
}
</style>
</head>

<body>

<header>
Historia de las 12 Tribus de Israel
</header>

<div class="tabs">

<div class="tab active" onclick="cargarPagina('efrain.html',this)">
Tribu de Efraín
</div>

<div class="tab" onclick="cargarPagina('Camino de Sanación.html',this)">
Camino de Sanación
</div>

<div class="tab" onclick="cargarPagina('pagina3.html',this)">
Página 3
</div>

<div class="tab" onclick="cargarPagina('pagina4.html',this)">
Página 4
</div>

<div class="tab" onclick="cargarPagina('pagina5.html',this)">
Página 5
</div>

</div>

<div class="contenido">
<iframe id="visor" src="efrain.html"></iframe>
</div>

<script>
function cargarPagina(pagina,elemento){

document.getElementById("visor").src = pagina;

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

elemento.classList.add("active");
}
</script>

</body>
</html>
